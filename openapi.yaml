openapi: 3.0.3
info:
  title: PayloadFix — LLM JSON extract & repair
  description: |
    Turn messy **LLM / chatbot text** into parsed JSON: strips ```json fences, finds JSON in prose,
    fixes common syntax issues. Also text stats and SHA-256 for pipeline tooling.

    **RapidAPI:** set `servers[0].url` to your HTTPS base (no trailing slash) before import.
    If your origin uses `API_KEYS`, add header `X-API-Key` to backend requests from RapidAPI.
  version: 0.2.0
servers:
  - url: https://YOUR_HOST
    description: Replace YOUR_HOST with your deployed API origin (e.g. Render URL)
paths:
  /v1/health:
    get:
      summary: Health and endpoint list
      security: []
      responses:
        '200':
          description: OK
  /v1/llm/stabilize:
    post:
      summary: Parse LLM-style text into JSON (fences, embedded object, jsonrepair)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw]
              properties:
                raw:
                  type: string
                  description: >
                    Full model message or snippet — may include ```json fences, surrounding prose,
                    or minor JSON syntax errors.
                sortKeys:
                  type: boolean
                  default: true
                pretty:
                  type: boolean
                  default: true
            examples:
              fenced:
                summary: Markdown-wrapped JSON
                value:
                  raw: "```json\n{\"items\":[1,2],}\n```"
                  sortKeys: true
                  pretty: true
              prose:
                summary: JSON inside a sentence
                value:
                  raw: 'Sure — here is the data: {"ok":true,} thanks!'
      responses:
        '200':
          description: Stabilized JSON
          content:
            application/json:
              schema:
                type: object
        '422':
          description: Could not parse even after LLM prep and repair
  /v1/text/stats:
    post:
      summary: Character, line, word counts + rough token hint (for LLM context sizing)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Stats
  /v1/hash/sha256:
    post:
      summary: SHA-256 of UTF-8 text or hex buffer
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                encoding:
                  type: string
                  enum: [utf8, hex]
                  default: utf8
      responses:
        '200':
          description: Hex digest
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
