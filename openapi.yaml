openapi: 3.0.3
info:
  title: PayloadFix API
  description: |
    LLM-focused helpers: extract and repair JSON from model output (markdown fences, prose around JSON),
    plus text stats and SHA-256 for tooling around LLM pipelines.
  version: 0.2.0
servers:
  - url: https://YOUR_HOST
    description: Production
paths:
  /v1/health:
    get:
      summary: Health and endpoint list
      security: []
      responses:
        '200':
          description: OK
  /v1/llm/stabilize:
    post:
      summary: Parse LLM-style text into JSON (fences, embedded object, jsonrepair)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw]
              properties:
                raw:
                  type: string
                  description: >
                    Full model message or snippet — may include ```json fences, surrounding prose,
                    or minor JSON syntax errors.
                sortKeys:
                  type: boolean
                  default: true
                pretty:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Stabilized JSON
        '422':
          description: Could not parse even after LLM prep and repair
  /v1/text/stats:
    post:
      summary: Character, line, word counts + rough token hint (for LLM context sizing)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Stats
  /v1/hash/sha256:
    post:
      summary: SHA-256 of UTF-8 text or hex buffer
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                encoding:
                  type: string
                  enum: [utf8, hex]
                  default: utf8
      responses:
        '200':
          description: Hex digest
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
