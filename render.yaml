# Render Blueprint: https://render.com/docs/blueprint-spec
# In the Render dashboard: New → Blueprint → connect this repo (or fork).

services:
  - type: web
    name: payloadfix-api
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
